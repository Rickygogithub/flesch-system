<style>
  :root{
    --bg:#ffffff; --panel:#f1f3f6; --ink:#14181f; --muted:#3d4654;

  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:'Yu Gothic','Hiragino Sans','Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:640px;margin:0 auto;padding:18px 16px 40px}
  h1{font-size:18px;font-weight:800;margin:6px 0 2px;color:#0f1722}
  .sub{color:var(--muted);font-size:13px;font-weight:600;margin-bottom:14px;line-height:1.7}

  .seg button{flex:1;border:none;background:#fff;color:var(--muted);padding:10px 12px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
  .seg button.on{background:var(--accent);color:#fff}

  .bars{display:flex;flex-wrap:wrap;gap:0;font-size:20px;font-weight:700;letter-spacing:1px;line-height:2.2}
  .barsep{color:var(--line);margin:0 8px;font-weight:400}
  .measure-label{color:var(--muted);font-size:12px;font-weight:700;margin-top:14px}
  .answer{margin-top:16px;min-height:70px;text-align:center}
  .answer .doremi{font-size:22px;font-weight:800;color:#0f1722;line-height:1.9;word-spacing:6px}
  .answer .german{font-size:16px;font-weight:700;color:var(--muted);margin-top:6px;word-spacing:6px}
  .placeholder{color:var(--muted);font-size:14px;font-weight:600;text-align:center;padding:30px 0}
  .controls{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
  button.act{font-family:inherit;border:none;border-radius:10px;padding:13px 16px;font-size:15px;font-weight:700;cursor:pointer;color:#fff;background:var(--accent);flex:1;min-width:120px}
  button.act:active{transform:translateY(1px)}
  button.alt{background:#5b6472}
  .footnote{color:var(--muted);font-size:12.5px;font-weight:600;margin-top:18px;line-height:1.75}
</style>

<div class="wrap">
  <h1>Orchestra Excerpt</h1>
  <div class="sub">実際の楽譜から抽出した視唱訓練です。まずスキャン楽譜を見て音名を思い浮かべ、「答えを見る」で照合。「🔊 音を聴く」で音を確認できます（オクターブは実際の楽譜とは異なる場合がありますが、音名＝ピッチクラスは正確です）。</div>

  <div class="seg" id="seg-group">
    <button data-v="1" class="on">マーラー Sym5, 2mov（530〜532）</button>
    <button data-v="2">マーラー Sym5, 2mov（532後半〜534）</button>
    <button data-v="3">マーラー Sym5, 3mov（472〜474）</button>
    <button data-v="4">マーラー Sym5, 3mov（482〜485）</button>
    <button data-v="5">マーラー Sym5, 3mov（596〜598）</button>
    <button data-v="6">マーラー Sym5, 3mov（599〜601）</button>
  </div>

  <details style="margin-bottom:14px">
    <summary style="cursor:pointer;font-size:13px;font-weight:700;color:var(--accent);padding:6px 0">📄 実際のスキャン楽譜を見る</summary>
    <div id="score-images-1" style="text-align:center"></div>
    <div id="score-images-2" style="text-align:center;display:none"></div>

  <div class="cardarea">

let currentGroup='1';
let revealed=false;
let audioCtx=null;

function flatten(measures){
  const flat=[];
  measures.forEach((m,mi)=>{
    m.forEach(note=>flat.push(note));
  });
  return flat;
}

function buildAudioSeq(measures){
  const flat=flatten(measures);
  const seq=[];
  let prev=null;
  const startMidi=76; // E5付近を基準に開始
  flat.forEach(nd=>{
    if(nd.rest){ seq.push(null); return; }
    let pc=SEMI[nd.n]+(nd.a==='#'?1:nd.a==='b'?-1:0);
    pc=((pc%12)+12)%12;
    let midi;
    if(prev!==null && nd.interval!==undefined){
      midi = prev + nd.interval;
    } else if(prev===null){
      let base=startMidi-(startMidi%12);
      midi=base+pc;
      while(midi<startMidi-6) midi+=12;
      while(midi>startMidi+6) midi-=12;
    } else {
      let candidates=[];
      for(let o=-1;o<=1;o++){
        let base=prev-(prev%12)+pc+o*12;
        candidates.push(base);
      }
      if(nd.forceUp){
        let up=candidates.filter(c=>c>prev).sort((a,b)=>a-b);
        midi = up.length ? up[0] : candidates.sort((a,b)=>Math.abs(a-prev)-Math.abs(b-prev))[0];
      } else if(nd.forceDown){
        let down=candidates.filter(c=>c<prev).sort((a,b)=>b-a);
        midi = down.length ? down[0] : candidates.sort((a,b)=>Math.abs(a-prev)-Math.abs(b-prev))[0];
      } else {
        candidates.sort((a,b)=>Math.abs(a-prev)-Math.abs(b-prev));
        midi=candidates[0];
      }
    }
    if(nd.oct) midi += nd.oct*12;
    seq.push(midi);
    prev=midi;
  });
  return seq;
}

function renderBars(measures){
  const barsDiv=document.getElementById('bars');
  barsDiv.innerHTML='<span style="color:var(--muted);font-size:14px;font-weight:600">📄 上の「実際のスキャン楽譜を見る」を開いて、音名と音高を思い浮かべて歌ってください</span>';
}

function renderAnswer(measures){
  const doremi=measures.map(m=>
    m.map(n=>n.rest?'（休）':DOREMI[n.n]+(n.a==='#'?'♯':n.a==='b'?'♭':'')).join('')
  ).join('｜');
  const ger=measures.map(m=>
    m.map(n=>n.rest?'—':germanName(n.n,n.a)).join(' ')
  ).join(' ｜ ');
  const ans=document.getElementById('answer');
  ans.className='answer';
  ans.innerHTML='<div class="doremi">'+doremi+'</div><div class="german">'+ger+'</div>';
}

function loadGroup(){
  const measures = currentGroup==='1' ? group1 : currentGroup==='2' ? group2 : currentGroup==='3' ? group3 : currentGroup==='4' ? group4 : currentGroup==='5' ? group5 : group6;
  renderBars(measures);
  renderScoreImages(currentGroup);
  revealed=false;
  const ans=document.getElementById('answer');
  ans.className='answer placeholder';
  ans.textContent='音名と音高を思い浮かべて歌い、「答えを見る」';
  document.getElementById('reveal').style.display='';
  document.getElementById('audio-controls').style.display='none';
}

function reveal(){
  if(revealed) return;
  revealed=true;
  const measures = currentGroup==='1' ? group1 : currentGroup==='2' ? group2 : currentGroup==='3' ? group3 : currentGroup==='4' ? group4 : currentGroup==='5' ? group5 : group6;
  renderAnswer(measures);
  document.getElementById('reveal').style.display='none';
  document.getElementById('audio-controls').style.display='flex';
}

function ensureCtx(){
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume().catch(e=>console.error(e));
  return audioCtx;
}

function playSequence(){
  const measures = currentGroup==='1' ? group1 : currentGroup==='2' ? group2 : currentGroup==='3' ? group3 : currentGroup==='4' ? group4 : currentGroup==='5' ? group5 : group6;
  const midiSeq=buildAudioSeq(measures);
  const ctx=ensureCtx();
  const t0=ctx.currentTime+0.05;
  const noteDur=0.28;
  const gap=0.32;
  midiSeq.forEach((midi,i)=>{
    if(midi===null) return; // 休符：無音のまま時間だけ経過
    const start=t0+i*gap;
    const freq=442*Math.pow(2,(midi-69)/12);
    const osc=ctx.createOscillator(); osc.type='triangle'; osc.frequency.value=freq;
    const gain=ctx.createGain();
    gain.gain.setValueAtTime(0.0001,start);
    gain.gain.exponentialRampToValueAtTime(0.28,start+0.03);
    gain.gain.setValueAtTime(0.28,start+noteDur);
    gain.gain.exponentialRampToValueAtTime(0.0001,start+noteDur+0.12);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(start); osc.stop(start+noteDur+0.15);
  });
}

document.getElementById('seg-group').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  currentGroup=b.dataset.v;
  [...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));
  loadGroup();
});
document.getElementById('reveal').onclick=reveal;
document.getElementById('playSound').onclick=playSequence;

loadGroup();
</script>
